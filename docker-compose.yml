version: "3"

services:

  frontend:
    image: nginx
    volumes:
      - ./frontend:/usr/share/nginx/html
    ports:
      - "3000:80"

  gateway:
    build: ./gateway
    ports:
      - "5000:5000"

  url-service:
    build: ./url-service
    ports:
      - "5001:5001"

  analytics:
    build: ./analytics-service
    ports:
      - "5002:5002"
